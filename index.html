<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Приглашение на 8 Марта</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6e7,#fff);
text-align:center;
overflow-x:hidden;
}

.card{
background:white;
max-width:600px;
margin:80px auto;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:relative;
z-index:2;
}

h1{
color:#d63384;
font-size:36px;
}

.info{
font-size:20px;
margin-top:20px;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
cursor:pointer;
}

button:hover{
background:#e60073;
}

#countdown{
font-size:24px;
margin-top:20px;
color:#c2185b;
}

.flower{
position:fixed;
top:-10px;
font-size:25px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px);
}
100%{
transform:translateY(110vh);
}
}

iframe{
margin-top:20px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="card">

<h1>🌸 Приглашение 🌸</h1>

<p>Приглашаем вас на праздничный вечер</p>
<p>в честь <b>8 Марта</b></p>

<div class="info">

<p><b>Дата:</b> 9 марта</p>
<p><b>Время:</b> 17:00</p>
<p><b>Место:</b> ресторан Serebro</p>
<p><b>Адрес:</b> Улица Астана 48/1</p>

</div>

<div id="countdown"></div>

<button onclick="alert('Отлично! Будем рады вас видеть 🌸')">
Я приду
</button>

<br><br>

<iframe
width="100%"
height="250"
src="https://maps.google.com/maps?q=Усть-Каменогорск%20Астана%2048/1&t=&z=15&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

<script>

function createFlower(){
const flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},8000);
}

setInterval(createFlower,300);

const target=new Date("March 9, 2026 17:00:00").getTime();

setInterval(function(){

const now=new Date().getTime();
const distance=target-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
"До праздника осталось: "+
days+"д "+
hours+"ч "+
minutes+"м "+
seconds+"с ";

},1000);

</script>

</body>
</html>
