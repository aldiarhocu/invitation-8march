<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#fff);
text-align:center;
overflow-x:hidden;
}

.container{
max-width:650px;
margin:80px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
position:relative;
z-index:2;
}

h1{
color:#d63384;
font-size:38px;
}

.text{
font-size:20px;
margin-top:20px;
line-height:1.6;
}

.info{
margin-top:25px;
font-size:20px;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
cursor:pointer;
}

button:hover{
background:#e60073;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
width:200px;
}

#countdown{
font-size:24px;
margin-top:20px;
color:#c2185b;
}

.flower{
position:fixed;
top:-10px;
font-size:25px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0.7;
}
}

iframe{
margin-top:25px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>🌸 Приглашение 🌸</h1>

<div class="text">

<p><b>Наши девочки!</b></p>

<p>
Приглашаем вас на прекрасный вечер,
посвящённый празднику <b>8 Марта</b>.
</p>

<p>
С вас — хорошее настроение, улыбки и весёлое настроение ✨
</p>

</div>

<div class="info">

<p><b>Дата:</b> 9 марта</p>
<p><b>Время:</b> 17:00</p>
<p><b>Место:</b> ресторан Serebro</p>
<p><b>Адрес:</b> Усть-Каменогорск, ул. Астана 48/1</p>

</div>

<div id="countdown"></div>

<h3>Подтвердите участие 💌</h3>

<input id="name" placeholder="Ваше имя">

<br>

<button onclick="rsvp()">Я приду</button>

<p id="result"></p>

<iframe
width="100%"
height="250"
src="https://maps.google.com/maps?q=Усть-Каменогорск%20Астана%2048/1&t=&z=15&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

<audio id="music" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6b2a3b96ff.mp3?filename=spring-ambient-110624.mp3">
</audio>

<script>

function createFlower(){
const flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},10000);
}

setInterval(createFlower,250);

function rsvp(){
const name=document.getElementById("name").value;

if(name===""){
alert("Введите имя 😊");
return;
}

document.getElementById("result").innerHTML=
name+" подтвердил(а) участие 🌸";

}

const target=new Date("March 9, 2026 17:00:00").getTime();

setInterval(function(){

const now=new Date().getTime();
const distance=target-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
"До праздника осталось: "+
days+"д "+
hours+"ч "+
minutes+"м "+
seconds+"с ";

},1000);

</script>

</body>
</html>
