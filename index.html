<h2>🌸 Наши девочки 🌸</h2>

<div class="gallery">

<img src="photo1.jpg.jpeg" class="photo">
<img src="photo2.jpg.jpeg" class="photo">
<img src="photo3.jpg.jpeg" class="photo">
<img src="photo4.jpg.jpeg" class="photo">
<img src="photo5.jpg.jpeg" class="photo">
<img src="photo6.jpg.jpeg" class="photo">

</div>

<div id="viewer">
<img id="fullImg">
</div>

<style>

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:30px;
}

.photo{
width:100%;
border-radius:18px;
cursor:pointer;
opacity:0;
transform:translateY(40px);
transition:all 0.8s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.photo.show{
opacity:1;
transform:translateY(0);
}

.photo:hover{
transform:scale(1.05);
}

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

#viewer img{
max-width:90%;
max-height:90%;
border-radius:15px;
}

</style>

<script>

const photos = document.querySelectorAll('.photo');

function showPhotos(){
const trigger = window.innerHeight * 0.9;

photos.forEach(photo=>{
const top = photo.getBoundingClientRect().top;

if(top < trigger){
photo.classList.add('show');
}
});
}

window.addEventListener('scroll',showPhotos);
showPhotos();


const viewer = document.getElementById("viewer");
const fullImg = document.getElementById("fullImg");

photos.forEach(img=>{
img.onclick = function(){
viewer.style.display = "flex";
fullImg.src = this.src;
}
});

viewer.onclick = function(){
viewer.style.display = "none";
}

</script>
